executor: slurm
jobs: 100
default-resources:
    slurm_partition: "standard"
    slurm_account:  "river"
    mem_mb: 7000
    runtime: 60
    qos: "serial"

max-jobs-per-second: 10
max-status-checks-per-second: 1
local-cores: 1
latency-wait: 60
keep-going: True
rerun-incomplete: True
printshellcmds: True
scheduler: greedy
use-conda: True
conda-prefix: snakemake_envs/
slurm-keep-successful-logs: False